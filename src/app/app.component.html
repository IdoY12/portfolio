<!-- Navigation -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="nav-container container">
    <a href="#hero" class="nav-logo" (click)="scrollToSection('hero'); $event.preventDefault()">
      Portfolio
    </a>
    
    <!-- Desktop Navigation -->
    <ul class="nav-menu desktop-menu">
      @for (section of sections; track section.id) {
        <li>
          <a
            [href]="'#' + section.id"
            (click)="scrollToSection(section.id); $event.preventDefault()"
            class="nav-link">
            {{ section.label }}
          </a>
        </li>
      }
    </ul>
    
    <!-- Mobile Menu Toggle -->
    <button
      class="menu-toggle"
      [class.active]="isMenuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  
  <!-- Mobile Navigation -->
  <ul class="nav-menu mobile-menu" [class.active]="isMenuOpen">
    @for (section of sections; track section.id) {
      <li>
        <a
          [href]="'#' + section.id"
          (click)="scrollToSection(section.id); closeMenu(); $event.preventDefault()"
          class="nav-link">
          {{ section.label }}
        </a>
      </li>
    }
  </ul>
</nav>

<!-- Main Content -->
<main>
  <app-hero></app-hero>
  <app-tech-stack></app-tech-stack>
  <app-projects></app-projects>
  <app-links></app-links>
</main>

<!-- Scroll to Top Button -->
@if (showScrollTop) {
  <button
    class="scroll-top-btn"
    (click)="scrollToTop()"
    aria-label="Scroll to top"
    [@fadeIn]>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
}
